    <title>Math Operators</title>

<body>

    <h1>Math Test!</h1>

    <br>

    <p id="math-add">Do Addition!</p>
    <button onclick="perform_Addition()">Add 15 + 5</button>

    <button onclick="subtraction_Function(10, 7)">Subtract 10 - 7</button>
