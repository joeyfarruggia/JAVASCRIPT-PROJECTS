<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Data Attribute Example</title>
	<script src="JavaScript/JavaScript_3.js" defer></script>
</head>

<body>
	<h1>Famous TV Cars</h1>
	<p>Click on a car to see what show it is from!</p>
<ul>
    <li onclick="displayType(this)" id="KITT" data-character-type="Knight Rider">KITT</li>
    <li onclick="displayType(this)" id="General_Lee" data-character-type="The Dukes of Hazzard">General Lee</li>
    <li onclick="displayType(this)" id="DeLorean" data-character-type="Back to the Future">DeLorean</li>
    <li onclick="displayType(this)" id="A_Team_Van" data-character-type="The A-Team">A-Team Van</li>
    <li onclick="displayType(this)" id="Batmobile" data-character-type="Batman">Batmobile</li>
</ul>
</body>

</html>
